<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gym Leader Cards</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Sarabun:wght@300;400;600;700&display=swap');

  :root {
    --gold: #f0c040;
    --dark: #080810;
    --panel: #10101c;
    --panel2: #16162a;
    --border: #252540;
    --text: #e8e0d0;
    --muted: #666688;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 1.5rem 1rem 1rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(240,192,64,0.05) 0%, transparent 100%);
  }
  header h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(1rem, 4vw, 1.8rem);
    color: var(--gold);
    text-shadow: 0 0 30px rgba(240,192,64,0.35);
  }
  header p { color: var(--muted); font-size: 0.8rem; margin-top: 0.3rem; }

  .trainer-row {
    display: flex; gap: 0.4rem; padding: 0.8rem;
    overflow-x: auto; scrollbar-width: none;
    flex-wrap: wrap; justify-content: center;
    border-bottom: 1px solid var(--border);
  }
  .trainer-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0.4rem 0.8rem; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--panel);
    cursor: pointer; font-family: 'Sarabun', sans-serif;
    font-size: 0.78rem; color: var(--muted); transition: all 0.2s;
    white-space: nowrap;
  }
  .trainer-btn:hover { border-color: var(--gold); color: var(--text); }
  .trainer-btn.active { border-color: var(--gold); background: rgba(240,192,64,0.1); color: var(--gold); }
  .trainer-btn .cnt { background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 8px; font-size: 0.65rem; }

  .set-row {
    display: flex; gap: 0.5rem; padding: 0.6rem 0.8rem;
    justify-content: center; border-bottom: 1px solid var(--border);
  }
  .set-btn {
    padding: 0.25rem 0.9rem; border-radius: 14px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); cursor: pointer; font-family: 'Sarabun', sans-serif;
    font-size: 0.75rem; transition: all 0.15s;
  }
  .set-btn.active, .set-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(240,192,64,0.07); }

  .main { max-width: 1000px; margin: 0 auto; padding: 1rem; }

  .bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
  .bar-title { font-family: 'Cinzel Decorative', cursive; font-size: 0.75rem; color: var(--gold); }
  .bar-count { font-size: 0.7rem; color: var(--muted); background: var(--panel); border: 1px solid var(--border); padding: 2px 10px; border-radius: 8px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.7rem; }

  .card-item {
    border-radius: 10px; overflow: hidden;
    border: 1.5px solid var(--border); background: var(--panel2);
    cursor: pointer; transition: all 0.2s;
  }
  .card-item:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.5); }

  .card-img-box {
    width: 100%; aspect-ratio: 2.5/3.5; background: #0c0c18;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .card-img-box img { width: 100%; height: 100%; object-fit: cover; }
  .placeholder { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--muted); font-size: 0.6rem; text-align: center; padding: 0.4rem; }
  .placeholder .ball { font-size: 1.6rem; opacity: 0.2; }
  .spinner-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--muted); font-size: 0.6rem; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .card-label { padding: 0.35rem 0.45rem; }
  .card-label .pname { font-size: 0.68rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-label .pmeta { display: flex; justify-content: space-between; margin-top: 2px; }
  .card-label .pset { font-size: 0.58rem; color: var(--muted); }
  .card-label .pnum { font-size: 0.58rem; color: var(--gold); opacity: 0.7; }

  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 200;
    align-items: center; justify-content: center;
    padding: 1rem; backdrop-filter: blur(6px);
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--panel2); border: 1.5px solid var(--gold);
    border-radius: 16px; max-width: 340px; width: 100%;
    overflow: hidden; animation: pop 0.2s ease; position: relative;
  }
  @keyframes pop { from { opacity: 0; transform: scale(0.88); } to { opacity: 1; transform: scale(1); } }
  .modal-close {
    position: absolute; top: 8px; right: 8px;
    background: rgba(0,0,0,0.6); border: 1px solid var(--border);
    color: var(--text); width: 28px; height: 28px;
    border-radius: 50%; cursor: pointer; font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center; z-index: 1;
  }
  .modal-img-box {
    width: 100%; aspect-ratio: 2.5/3.5; background: #08080f;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .modal-img-box img { width: 100%; height: 100%; object-fit: contain; }
  .modal-body { padding: 0.8rem; }
  .modal-body h3 { font-size: 0.95rem; color: var(--gold); font-weight: 700; }
  .modal-body .mmeta { font-size: 0.75rem; color: var(--muted); margin-top: 3px; }
  .modal-body .sinfo { margin-top: 0.5rem; font-size: 0.65rem; color: var(--muted); background: rgba(255,255,255,0.04); padding: 4px 8px; border-radius: 6px; }

  .empty { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.85rem; }
</style>

const imgCache = {};

async function fetchImage(name, set, num) {
  const key = `${set}-${num}`;
  if (imgCache[key] !== undefined) return imgCache[key];
  imgCache[key] = null; // mark as loading

  const setFull = set === 'GH' ? 'Gym Heroes' : 'Gym Challenge';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{
          role: 'user',
          content: `Search for a direct image URL of the Pokemon card "${name}" from the ${setFull} TCG set, card number ${num}/132.
Look for a card scan image (.jpg or .png) from sites like bulbapedia, serebii, cardmarket, tcgplayer, or similar.
Return ONLY valid JSON: {"url":"https://example.com/image.jpg","src":"site name"}
No markdown, no explanation.`
        }]
      })
    });
    const data = await res.json();
    const fullText = (data.content || []).map(b => b.text || '').join('');
    const match = fullText.match(/\{\s*"url"\s*:\s*"(https?[^"]+\.(?:jpg|jpeg|png|webp)[^"]*)"[^}]*\}/i);
    if (match) {
      imgCache[key] = match[1];
      return match[1];
    }
  } catch(e) {}
  imgCache[key] = '';
  return '';
}

let activeTrainer = 'sabrina';
let activeSet = 'all';

function getFiltered(tid) {
  return (CARDS[tid] || []).filter(c => activeSet === 'all' || c[1] === activeSet);
}

function renderTabs() {
  document.getElementById('trainerRow').innerHTML = TRAINERS.map(t => {
    const cnt = getFiltered(t.id).length;
    return `<button class="trainer-btn ${activeTrainer===t.id?'active':''}" onclick="selectTrainer('${t.id}')">
      ${t.icon} ${t.name} <span class="cnt">${cnt}</span>
    </button>`;
  }).join('');
}

function cardHTML(c, i) {
  const [name, set, num] = c;
  const key = `${set}-${num}`;
  const setLabel = set === 'GH' ? 'GH' : 'GC';
  const url = imgCache[key];
  let inner = '';
  if (url) {
    inner = `<img src="${url}" alt="${name}" onerror="this.parentNode.innerHTML='<div class=\\'placeholder\\'><div class=\\'ball\\'>⚪</div><div>${name}</div></div>'">`;
  } else if (url === '') {
    inner = `<div class="placeholder"><div class="ball">⚪</div></div>`;
  } else {
    inner = `<div class="spinner-wrap" id="sw-${key}"><div class="spinner"></div></div>`;
  }
  return `<div class="card-item" onclick="openModal(${i})" id="ci-${key}">
    <div class="card-img-box" id="ib-${key}">${inner}</div>
    <div class="card-label">
      <div class="pname">${name}</div>
      <div class="pmeta"><span class="pset">${setLabel}</span><span class="pnum">#${num}</span></div>
    </div>
  </div>`;
}

function renderCards() {
  const trainer = TRAINERS.find(t => t.id === activeTrainer);
  const cards = getFiltered(activeTrainer);
  document.getElementById('barTitle').textContent = trainer ? `${trainer.icon} ${trainer.name} (${trainer.jp})` : '';
  document.getElementById('barCount').textContent = `${cards.length} ใบ`;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if (!cards.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  grid.innerHTML = cards.map((c, i) => cardHTML(c, i)).join('');

  // Load images async
  cards.forEach(async (c, i) => {
    const [name, set, num] = c;
    const key = `${set}-${num}`;
    if (imgCache[key] !== undefined) return;
    const url = await fetchImage(name, set, num);
    const box = document.getElementById(`ib-${key}`);
    if (!box) return;
    if (url) {
      box.innerHTML = `<img src="${url}" alt="${name}" onerror="this.parentNode.innerHTML='<div class=\\'placeholder\\'><div class=\\'ball\\'>⚪</div></div>'">`;
    } else {
      box.innerHTML = `<div class="placeholder"><div class="ball">⚪</div></div>`;
    }
  });
}

function selectTrainer(id) {
  activeTrainer = id;
  renderTabs(); renderCards();
}

document.getElementById('setRow').addEventListener('click', e => {
  const btn = e.target.closest('.set-btn');
  if (!btn) return;
  activeSet = btn.dataset.set;
  document.querySelectorAll('.set-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTabs(); renderCards();
});

// Modal
function openModal(i) {
  const cards = getFiltered(activeTrainer);
  const [name, set, num] = cards[i];
  const key = `${set}-${num}`;
  const setLabel = set === 'GH' ? 'Gym Heroes' : 'Gym Challenge';
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalMeta').textContent = `${setLabel} · #${num}/132`;
  document.getElementById('overlay').classList.add('open');
  const box = document.getElementById('modalImgBox');
  const url = imgCache[key];
  if (url) {
    box.innerHTML = `<img src="${url}" alt="${name}">`;
    document.getElementById('sinfo').textContent = '✅ โหลดจาก cache';
  } else {
    box.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><span>AI กำลังค้นหา...</span></div>`;
    document.getElementById('sinfo').textContent = '🔍 ค้นหารูปจาก AI...';
    fetchImage(name, set, num).then(url => {
      const box2 = document.getElementById('modalImgBox');
      if (!box2) return;
      if (url) {
        box2.innerHTML = `<img src="${url}" alt="${name}">`;
        document.getElementById('sinfo').textContent = '✅ พบรูปแล้ว';
        const gridBox = document.getElementById(`ib-${key}`);
        if (gridBox) gridBox.innerHTML = `<img src="${url}" alt="${name}" onerror="this.parentNode.innerHTML='<div class=\\'placeholder\\'><div class=\\'ball\\'>⚪</div></div>'">`;
      } else {
        box2.innerHTML = `<div class="placeholder"><div class="ball">⚪</div><div>ไม่พบรูปครับ</div></div>`;
        document.getElementById('sinfo').textContent = '❌ ไม่พบรูปภาพ';
      }
    });
  }
}

document.getElementById('modalClose').onclick = () => document.getElementById('overlay').classList.remove('open');
document.getElementById('overlay').onclick = e => { if (e.target === document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); };

renderTabs();
renderCards();
</script>
